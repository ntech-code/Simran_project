services:
  backend:
    build: .
    container_name: tax-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./rules:/app/rules
      - ./schemas:/app/schemas
    restart: unless-stopped
    networks:
      - tax-network

  frontend:
    build: ./frontend
    container_name: tax-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - tax-network

networks:
  tax-network:
    driver: bridge
