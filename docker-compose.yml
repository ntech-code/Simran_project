services:
  backend:
    build: .
    image: tax-analysis-backend:latest
    container_name: tax-analysis-backend
    ports:
      - "8000:8000"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./rules:/app/rules
      - ./schemas:/app/schemas
    restart: unless-stopped
    networks:
      - tax-network

  frontend:
    image: tax-analysis-frontend:latest
    container_name: tax-analysis-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - tax-network

networks:
  tax-network:
    driver: bridge
